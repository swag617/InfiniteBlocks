# Global Settings
settings:
  default-scheme: "server_colors"

# Scheme Definitions
schemes:
  pastel_rainbow:
    item-name: "INFINITE %block%"
    name-gradient:
      - "#FF636A"
      - "#FEB144"
      - "#FDFD96"
      - "#77DD77"
      - "#9EC1CF"
      - "#CEACE6"
    item-lore:
      - "%gradient_line%"
      - "This block can be placed an %gradient_infinite% amount of times."
      - "%gradient_line%"
    blocks:
      - STONE

  strange_wood:
    item-name: "INFINITE %block%"
    name-gradient:
      - "#38220f"
      - "#967259"
      - "#ece0d1"
    item-lore:
      - "%gradient_line%"
      - "This block can be placed an %gradient_infinite% amount of times."
      - "%gradient_line%"
    blocks: []

  redstone:
    item-name: "INFINITE %block%"
    name-gradient:
      - "#FF7B7B"
      - "#FF0000"
      - "#704A4A"
      - "#FF0000"
      - "#FF7B7B"
    item-lore:
      - "%gradient_line%"
      - "This block can be placed an %gradient_infinite% amount of times."
      - "%gradient_line%"
    blocks:
      - REDSTONE_BLOCK

  server_colors:
    item-name: "INFINITE %block%"
    name-gradient:
      - "#C59CFF"
      - "#FF0199"
      - "#A900E4"
    item-lore:
